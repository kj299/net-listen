name: C/C++ CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    name: build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu
            os: ubuntu-latest
          - name: redhat
            os: ubuntu-latest
            container: redhat/ubi9
          - name: windows
            os: windows-latest

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools (RHEL)
        if: matrix.name == 'redhat'
        run: dnf install -y gcc make

      - name: Setup MSYS2 (Windows)
        if: matrix.name == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc make
          update: false

      - name: Build (Linux)
        if: matrix.name != 'windows'
        run: make

      - name: Build (Windows)
        if: matrix.name == 'windows'
        shell: msys2 {0}
        run: make
