name: C/C++ CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  linux:
    name: linux (${{ matrix.name }})
    runs-on: ubuntu-latest
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu
          - name: redhat
            container: redhat/ubi9
    steps:
      - uses: actions/checkout@v5

      - name: Install build tools (RHEL)
        if: matrix.name == 'redhat'
        run: dnf install -y gcc make

      - name: Build
        run: make

      - name: Smoke test
        run: |
          ./c_listener 54321 54322 &
          pid=$!
          sleep 1
          if ! kill -0 "$pid" 2>/dev/null; then
            echo "c_listener exited prematurely"; exit 1
          fi
          kill -INT "$pid" || true
          wait "$pid" 2>/dev/null || true
          echo "c_listener bound and ran"

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install NASM
        uses: ilammy/setup-nasm@v1

      - name: Show toolchain versions
        shell: bash
        run: |
          gcc --version | head -n 1
          nasm -v
          mingw32-make --version | head -n 1

      - name: Build (mingw32-make)
        shell: cmd
        run: mingw32-make

      - name: Smoke test
        shell: pwsh
        run: .\smoketest.ps1

      - name: Upload smoke-test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoketest-log
          path: smoketest.log

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: net-listen-windows-x64
          path: |
            c_listener.exe
            asm_listener.exe
