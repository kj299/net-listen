name: Release

# Cut a release by pushing a version tag, e.g.:
#   git tag v1.0.0 && git push origin v1.0.0
# This builds the binaries on Windows and Linux and publishes them on a
# GitHub Release for that tag.

on:
  push:
    tags: [ "v*" ]

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install NASM
        uses: ilammy/setup-nasm@v1

      - name: Build
        shell: cmd
        run: mingw32-make

      # Never publish untested binaries: the release build is independent of
      # the push CI, so run the full smoke test against these exact exes.
      - name: Smoke test
        shell: pwsh
        run: .\smoketest.ps1

      - name: Package
        shell: pwsh
        run: Compress-Archive -Path c_listener.exe, asm_listener.exe -DestinationPath net-listen-windows-x64.zip

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: net-listen-windows-x64.zip

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build
        run: make

      - name: Smoke test
        run: |
          ./c_listener 54321 54322 &
          pid=$!
          sleep 1
          if ! kill -0 "$pid" 2>/dev/null; then
            echo "c_listener exited prematurely"; exit 1
          fi
          kill -INT "$pid" || true
          wait "$pid" 2>/dev/null || true
          echo "c_listener bound and ran"

      - name: Package
        run: tar -czf net-listen-linux-x64.tar.gz c_listener

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: net-listen-linux-x64.tar.gz
